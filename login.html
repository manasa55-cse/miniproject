<!DOCTYPE html>
<html>
<head>
    <title>Login - SheCook Connect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-bg">

<div class="overlay d-flex justify-content-center align-items-center">
    <div class="card-custom col-md-4">
        <h2 class="text-center mb-3 text-white">SheCook Connect</h2>
        <form>
            <div class="mb-3">
                <input type="email" class="form-control" placeholder="Email / Phone">
            </div>
            <div class="mb-3">
                <input type="password" class="form-control" placeholder="Password">
            </div>
            <button class="btn btn-custom w-100">Login</button>
        </form>

        <div class="text-center mt-3">
            <a href="register.html">New user? Register here</a>
        </div>

        <div class="text-center mt-2">
            <a href="index.html">Back to Home</a>
        </div>
    </div>
</div>
</body>
</html>
